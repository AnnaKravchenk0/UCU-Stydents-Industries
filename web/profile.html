<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMatch - Friends</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* ── Left panel ── */
        .friends-sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sidebar-block {
            background: rgba(36, 30, 56, 0.8);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid rgba(184, 59, 136, 0.3);
        }

        .sidebar-block-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            background: var(--accent-pink);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            min-width: 22px;
            text-align: center;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 18px;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid transparent;
        }
        .friend-item:last-child { margin-bottom: 0; }
        .friend-item:hover  { background: rgba(255,255,255,0.05); }
        .friend-item.active { background: rgba(184,59,136,0.2); border-color: var(--accent-pink); }

        .avatar-circle {
            width: 42px;
            height: 42px;
            background: var(--accent-pink);
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: white;
        }

        .friend-name { font-weight: 600; font-size: 0.95rem; }
        .friend-sub  { font-size: 0.78rem; color: var(--text-sec); margin-top: 2px; }

        .request-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .btn-accept {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-accept:hover { background: #27ae60; transform: scale(1.05); }

        .btn-reject {
            background: transparent;
            color: #e74c3c;
            border: 1px solid #e74c3c;
            padding: 6px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-reject:hover { background: rgba(231,76,60,0.15); transform: scale(1.05); }

        .btn-unfriend {
            background: transparent;
            color: var(--text-sec);
            border: 1px solid #444;
            padding: 4px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
            margin-left: auto;
            flex-shrink: 0;
            opacity: 0;
        }
        .friend-item:hover .btn-unfriend { opacity: 1; }
        .btn-unfriend:hover { color: #e74c3c; border-color: #e74c3c; }

        /* ── Right panel ── */
        .movies-feed {
            background: rgba(36, 30, 56, 0.5);
            padding: 40px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .feed-header {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .feed-header-text h1 { margin-bottom: 6px; }

        .toggle-btn {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            align-self: center;
        }

        .toggle-btn button {
            background: transparent;
            border: none;
            color: var(--text-sec);
            padding: 8px 18px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
        }

        .toggle-btn button.active {
            background: var(--accent-pink);
            color: white;
        }

        /* Search */
        .search-section {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid #444;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.95rem;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--accent-pink);
        }

        /* Movies grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background: #1a162b;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }
        .movie-card:hover { transform: translateY(-5px); }

        .movie-poster {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
        }

        .movie-poster-placeholder {
            width: 100%;
            height: 260px;
            background: #2a2440;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 0.85rem;
            padding: 10px;
            text-align: center;
        }

        .movie-info { padding: 12px 15px; }

        .movie-rating-tag {
            display: inline-block;
            background: rgba(184, 59, 136, 0.2);
            color: var(--accent-pink);
            border-radius: 10px;
            padding: 2px 7px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 4px;
        }

        .common-badge {
            display: inline-block;
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 0.72rem;
            font-weight: 700;
            margin-top: 4px;
            margin-left: 4px;
        }

        .empty-msg {
            color: var(--text-sec);
            text-align: center;
            padding: 50px 0;
            grid-column: 1/-1;
            line-height: 1.8;
        }
        .empty-msg a { color: var(--accent-pink); text-decoration: none; }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background: rgba(184,59,136,0.3);
            border-color: var(--accent-pink);
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .page-btn.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
        }

        .page-info {
            color: var(--text-sec);
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #2ecc71;
            color: white;
            padding: 11px 28px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: #e74c3c; }

        /* Mobile styles – тільки пропорційне зменшення */
        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 250px 1fr;
                gap: 20px;
                padding: 10px;
            }
            .sidebar-block {
                padding: 15px;
            }
            .avatar-circle {
                width: 36px;
                height: 36px;
                font-size: 0.9rem;
            }
            .friend-name {
                font-size: 0.85rem;
            }
            .btn-unfriend {
                padding: 3px 8px;
                font-size: 0.7rem;
            }
            .movies-feed {
                padding: 25px;
            }
            .movies-grid {
                gap: 15px;
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .movie-poster {
                height: 200px;
            }
            .movie-poster-placeholder {
                height: 200px;
                font-size: 0.75rem;
            }
            .movie-info {
                padding: 8px 10px;
            }
            .movie-rating-tag, .common-badge {
                font-size: 0.65rem;
            }
            .page-btn {
                padding: 8px 15px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .profile-container {
                grid-template-columns: 180px 1fr;
                gap: 15px;
            }
            .sidebar-block {
                padding: 12px;
            }
            .avatar-circle {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
            }
            .friend-name {
                font-size: 0.75rem;
            }
            .friend-sub {
                font-size: 0.65rem;
            }
            .btn-unfriend {
                padding: 2px 6px;
                font-size: 0.6rem;
            }
            .movies-feed {
                padding: 20px;
            }
            .movies-grid {
                gap: 10px;
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            .movie-poster {
                height: 160px;
            }
            .movie-poster-placeholder {
                height: 160px;
                font-size: 0.7rem;
            }
            .movie-info {
                padding: 6px 8px;
            }
            .movie-rating-tag, .common-badge {
                font-size: 0.6rem;
            }
            .page-btn {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header will be inserted by header.js -->

    <div class="profile-container">

        <!-- Left panel -->
        <aside class="friends-sidebar">

            <!-- Incoming requests -->
            <div class="sidebar-block" id="requests-block" style="display:none;">
                <div class="sidebar-block-title">
                    Incoming Requests
                    <span class="badge" id="requests-badge">0</span>
                </div>
                <div id="requests-list"></div>
            </div>

            <!-- Friends list -->
            <div class="sidebar-block">
                <div class="sidebar-block-title">My Friends</div>
                <div id="friends-list">
                    <p style="color:var(--text-sec);">Loading...</p>
                </div>
                <a href="search_friends.html" style="
                    display:block; margin-top:15px; text-align:center;
                    padding:10px; border:2px dashed rgba(184,59,136,0.5);
                    border-radius:15px; color:var(--accent-pink);
                    text-decoration:none; font-size:0.9rem; transition:0.2s;">
                    + Find Friends
                </a>
            </div>

        </aside>

        <!-- Right panel -->
        <main class="movies-feed">
            <div class="feed-header">
                <div class="feed-header-text">
                    <h1 id="selected-friend-name">Select a friend to see their movies</h1>
                    <p id="selected-friend-stats" style="color:var(--text-sec);"></p>
                </div>

                <!-- Toggle button (hidden until a friend is selected) -->
                <div class="toggle-btn" id="toggle-btn" style="display:none;">
                    <button id="btn-all" class="active" onclick="switchMode('all')">
                        🎬 All Movies
                    </button>
                    <button id="btn-common" onclick="switchMode('common')">
                        ✨ Common
                    </button>
                </div>
            </div>

            <!-- Search (hidden until a friend is selected) -->
            <div class="search-section" id="search-section" style="display:none;">
                <input type="text" id="searchMovies" class="search-input" placeholder="🔍 Search in these movies..." oninput="filterMovies()">
            </div>

            <div class="movies-grid" id="movies-container"></div>

            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display:none;">
                <button class="page-btn" id="btn-prev" onclick="changePage(-1)">← Prev</button>
                <span class="page-info" id="page-info">Page 1 / 1</span>
                <button class="page-btn" id="btn-next" onclick="changePage(1)">Next →</button>
            </div>
        </main>

    </div>

    <div class="toast" id="toast"></div>

    <script src="header.js"></script>
    <script>
        const BASE_URL = 'http://127.0.0.1:8000';
        const token    = localStorage.getItem('token');

        // Current selected friend and data
        let currentFriend   = null;  // { id, username }
        let allMovies       = [];    // all friend's movies
        let commonMovies    = [];    // common movies
        let currentMode     = 'all'; // 'all' or 'common'
        let filteredMovies  = [];    // filtered list based on search
        const PER_PAGE      = 20;
        let currentPage     = 1;

        // ─────────────────────────────────────────
        // Start
        // ─────────────────────────────────────────
        async function init() {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const [friendsResp, requestsResp] = await Promise.all([
                    fetch(`${BASE_URL}/users/friends/my`,
                        { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${BASE_URL}/users/friends/requests/incoming`,
                        { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                if (friendsResp.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                    return;
                }

                const friends  = await friendsResp.json();
                const requests = await requestsResp.json();

                renderRequests(requests);
                renderFriends(friends);

            } catch (e) {
                window.location.href = 'p_error.html';
            }
        }

        // ─────────────────────────────────────────
        // Incoming requests
        // ─────────────────────────────────────────
        function renderRequests(requests) {
            const block = document.getElementById('requests-block');
            const list  = document.getElementById('requests-list');
            const badge = document.getElementById('requests-badge');

            if (!requests.length) {
                block.style.display = 'none';
                return;
            }

            block.style.display = 'block';
            badge.textContent   = requests.length;

            list.innerHTML = '';
            requests.forEach(user => {
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.id = `req-${user.id}`;
                div.innerHTML = `
                    <div class="avatar-circle">${user.username.charAt(0).toUpperCase()}</div>
                    <div>
                        <div class="friend-name">${user.username}</div>
                        <div class="friend-sub">wants to be friends</div>
                    </div>
                    <div class="request-actions">
                        <button class="btn-accept" onclick="acceptRequest(${user.id}, '${user.username}')">
                            ✓ Accept
                        </button>
                        <button class="btn-reject" onclick="rejectRequest(${user.id})">✗</button>
                    </div>`;
                list.appendChild(div);
            });
        }

        async function acceptRequest(senderId, username) {
            try {
                const resp = await fetch(`${BASE_URL}/users/friends/accept/${senderId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (resp.ok) {
                    removeRequestCard(senderId);
                    showToast(`✓ ${username} is now your friend!`);
                    addFriendToList({ id: senderId, username });
                } else {
                    const d = await resp.json();
                    showToast(d.detail || 'Error', true);
                }
            } catch (e) { showToast('Server error', true); }
        }

        async function rejectRequest(senderId) {
            try {
                const resp = await fetch(`${BASE_URL}/users/friends/${senderId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (resp.ok || resp.status === 204) {
                    removeRequestCard(senderId);
                    showToast('Request rejected');
                } else {
                    const d = await resp.json();
                    showToast(d.detail || 'Error', true);
                }
            } catch (e) { showToast('Server error', true); }
        }

        function removeRequestCard(senderId) {
            const card = document.getElementById(`req-${senderId}`);
            if (card) card.remove();
            const remaining = document.querySelectorAll('#requests-list .friend-item').length;
            document.getElementById('requests-badge').textContent = remaining;
            if (!remaining) document.getElementById('requests-block').style.display = 'none';
        }

        // ─────────────────────────────────────────
        // Friends list
        // ─────────────────────────────────────────
        function renderFriends(friends) {
            const list = document.getElementById('friends-list');
            if (!friends.length) {
                list.innerHTML = `
                    <div class="empty-msg">
                        No friends yet.<br>
                        <a href="search_friends.html">Find some!</a>
                    </div>`;
                return;
            }
            list.innerHTML = '';
            friends.forEach(f => addFriendToList(f));
        }

        function addFriendToList(friend) {
            const list     = document.getElementById('friends-list');
            const emptyMsg = list.querySelector('.empty-msg');
            if (emptyMsg) emptyMsg.remove();

            const div = document.createElement('div');
            div.className = 'friend-item';
            div.id = `friend-${friend.id}`;
            div.innerHTML = `
                <div class="avatar-circle">${friend.username.charAt(0).toUpperCase()}</div>
                <div>
                    <div class="friend-name">${friend.username}</div>
                    <div class="friend-sub">click to see movies</div>
                </div>
                <button class="btn-unfriend"
                    onclick="unfriend(event, ${friend.id}, '${friend.username}')">
                    Remove
                </button>`;
            div.onclick = (e) => {
                if (e.target.classList.contains('btn-unfriend')) return;
                selectFriend(friend, div);
            };
            list.appendChild(div);
        }

        async function unfriend(event, friendId, username) {
            event.stopPropagation();
            if (!confirm(`Remove ${username} from friends?`)) return;
            try {
                const resp = await fetch(`${BASE_URL}/users/friends/${friendId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (resp.ok || resp.status === 204) {
                    document.getElementById(`friend-${friendId}`)?.remove();
                    showToast(`${username} removed from friends`);
                    if (currentFriend?.id === friendId) resetFeed();
                    if (!document.querySelectorAll('#friends-list .friend-item').length) {
                        document.getElementById('friends-list').innerHTML = `
                            <div class="empty-msg">No friends yet.<br>
                            <a href="search_friends.html">Find some!</a></div>`;
                    }
                }
            } catch (e) { showToast('Server error', true); }
        }

        // ─────────────────────────────────────────
        // Select friend — load all and common movies
        // ─────────────────────────────────────────
        async function selectFriend(friend, element) {
            document.querySelectorAll('.friend-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            currentFriend = friend;
            currentMode   = 'all';
            currentPage   = 1;

            document.getElementById('selected-friend-name').textContent = `${friend.username}'s Movies`;
            document.getElementById('selected-friend-stats').textContent = 'Loading...';
            document.getElementById('movies-container').innerHTML = '';
            document.getElementById('toggle-btn').style.display = 'none';
            document.getElementById('search-section').style.display = 'none';

            document.getElementById('btn-all').classList.add('active');
            document.getElementById('btn-common').classList.remove('active');

            try {
                const [allResp, commonResp] = await Promise.all([
                    fetch(`${BASE_URL}/movies/${friend.id}/liked`),
                    fetch(`${BASE_URL}/movies/common/${friend.id}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                allMovies    = await allResp.json();
                commonMovies = await commonResp.json();

                if (allMovies.length > 0) {
                    document.getElementById('toggle-btn').style.display = 'flex';
                    document.getElementById('search-section').style.display = 'block';
                }

                // Initial display: all movies (filtered by empty search)
                filterMovies();

            } catch (e) {
                document.getElementById('selected-friend-stats').textContent = '';
                document.getElementById('movies-container').innerHTML =
                    '<p style="color:#e74c3c; grid-column:1/-1;">Failed to load movies.</p>';
            }
        }

        // ─────────────────────────────────────────
        // Filter movies by search
        // ─────────────────────────────────────────
        function filterMovies() {
            const query = document.getElementById('searchMovies')?.value.trim().toLowerCase() || '';
            const source = currentMode === 'all' ? allMovies : commonMovies;
            if (!query) {
                filteredMovies = [...source];
            } else {
                filteredMovies = source.filter(m =>
                    m.movie_name.toLowerCase().includes(query)
                );
            }
            currentPage = 1;
            renderMovies(filteredMovies, currentMode);
        }

        // ─────────────────────────────────────────
        // Switch mode All / Common
        // ─────────────────────────────────────────
        function switchMode(mode) {
            if (mode === currentMode) return;
            currentMode = mode;
            currentPage = 1;

            document.getElementById('btn-all').classList.toggle('active', mode === 'all');
            document.getElementById('btn-common').classList.toggle('active', mode === 'common');

            filterMovies(); // reapply search
        }

        // ─────────────────────────────────────────
        // Render movie cards with pagination
        // ─────────────────────────────────────────
        function renderMovies(movies, mode) {
            const container  = document.getElementById('movies-container');
            const pagination = document.getElementById('pagination');
            const stats      = document.getElementById('selected-friend-stats');
            const name       = currentFriend?.username || '';

            // Update stats
            if (mode === 'all') {
                stats.textContent = `${movies.length} movie${movies.length !== 1 ? 's' : ''} found`;
            } else {
                stats.textContent = movies.length > 0
                    ? `${movies.length} common movie${movies.length !== 1 ? 's' : ''} with you`
                    : `No common movies with ${name}`;
            }

            if (!movies.length) {
                container.innerHTML = `
                    <div class="empty-msg">
                        ${mode === 'common'
                            ? `No common movies yet.`
                            : `${name} hasn't liked any movies matching your search.`
                        }
                    </div>`;
                pagination.style.display = 'none';
                return;
            }

            const totalPages = Math.ceil(movies.length / PER_PAGE);
            const start      = (currentPage - 1) * PER_PAGE;
            const pageMovies = movies.slice(start, start + PER_PAGE);

            if (movies.length > PER_PAGE) {
                pagination.style.display = 'flex';
                document.getElementById('page-info').textContent =
                    `Page ${currentPage} / ${totalPages}`;
                document.getElementById('btn-prev').disabled = currentPage === 1;
                document.getElementById('btn-next').disabled = currentPage === totalPages;
            } else {
                pagination.style.display = 'none';
            }

            const commonIds = new Set(commonMovies.map(m => m.id));

            container.innerHTML = pageMovies.map(m => {
                const posterUrl = m.poster_url
                    || (m.poster_path
                        ? `https://image.tmdb.org/t/p/w500${m.poster_path}`
                        : '');

                const rating = m.vote_average && m.vote_average > 0
                    ? `<span class="movie-rating-tag">★ ${m.vote_average.toFixed(1)}</span>`
                    : '';

                const year = m.release_date
                    ? `<span style="color:var(--text-sec); font-size:0.8rem;">
                        ${m.release_date.split('-')[0]}
                       </span>`
                    : '';

                const commonMark = (mode === 'all' && commonIds.has(m.id))
                    ? `<span class="common-badge">✨ common</span>`
                    : '';

                return `
                <div class="movie-card" title="${m.overview || ''}">
                    ${posterUrl
                        ? `<img src="${posterUrl}" class="movie-poster" alt="${m.movie_name}">`
                        : `<div class="movie-poster-placeholder">${m.movie_name}</div>`
                    }
                    <div class="movie-info">
                        <div style="font-weight:600; font-size:0.95rem;
                            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            ${m.movie_name}
                        </div>
                        <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:4px;">
                            ${year}
                            ${rating}
                            ${commonMark}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function changePage(direction) {
            const totalPages = Math.ceil(filteredMovies.length / PER_PAGE);
            currentPage = Math.max(1, Math.min(totalPages, currentPage + direction));
            renderMovies(filteredMovies, currentMode);
            document.querySelector('.movies-feed').scrollIntoView({ behavior: 'smooth' });
        }

        function resetFeed() {
            currentFriend = null;
            allMovies     = [];
            commonMovies  = [];
            filteredMovies = [];
            document.getElementById('selected-friend-name').textContent = 'Select a friend to see their movies';
            document.getElementById('selected-friend-stats').textContent = '';
            document.getElementById('movies-container').innerHTML = '';
            document.getElementById('toggle-btn').style.display  = 'none';
            document.getElementById('search-section').style.display = 'none';
            document.getElementById('pagination').style.display  = 'none';
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className   = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => { toast.className = 'toast'; }, 2500);
        }

        init();
    </script>
</body>
</html>

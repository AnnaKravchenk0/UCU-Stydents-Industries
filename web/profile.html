<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMatch - Friends</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1.5rem;
            width: 100%;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* Ліва панель */
        .friends-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-block {
            background: rgba(36, 30, 56, 0.8);
            backdrop-filter: blur(20px);
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(184, 59, 136, 0.3);
        }

        .sidebar-block-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            background: var(--accent-pink);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            border-radius: 1rem;
            min-width: 1.5rem;
            text-align: center;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid transparent;
        }
        .friend-item:last-child { margin-bottom: 0; }
        .friend-item:hover { background: rgba(255,255,255,0.05); }
        .friend-item.active {
            background: rgba(184,59,136,0.2);
            border-color: var(--accent-pink);
        }

        .avatar-circle {
            width: 2.5rem;
            height: 2.5rem;
            background: var(--accent-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            flex-shrink: 0;
        }

        .friend-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .friend-sub {
            font-size: 0.7rem;
            color: var(--text-sec);
        }

        .request-actions {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
        }

        .btn-accept {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 0.7rem;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .btn-reject {
            background: transparent;
            color: #e74c3c;
            border: 1px solid #e74c3c;
            padding: 0.3rem 0.8rem;
            border-radius: 0.7rem;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .btn-unfriend {
            background: transparent;
            color: var(--text-sec);
            border: 1px solid #444;
            padding: 0.2rem 0.5rem;
            border-radius: 0.6rem;
            cursor: pointer;
            font-size: 0.7rem;
            margin-left: auto;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .friend-item:hover .btn-unfriend { opacity: 1; }
        .btn-unfriend:hover { color: #e74c3c; border-color: #e74c3c; }

        /* Права панель */
        .movies-feed {
            background: rgba(36, 30, 56, 0.5);
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .feed-header-text h1 {
            font-size: 1.5rem;
            margin-bottom: 0.2rem;
        }

        .toggle-btn {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 2rem;
            padding: 0.2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toggle-btn button {
            background: transparent;
            border: none;
            color: var(--text-sec);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .toggle-btn button.active {
            background: var(--accent-pink);
            color: white;
        }

        .search-section {
            margin-bottom: 1.5rem;
        }
        .search-input {
            width: 100%;
            max-width: 350px;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            border: 1px solid #444;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.9rem;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.2rem;
            width: 100%;
        }

        .movie-card {
            background: #1a162b;
            border-radius: 1rem;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .movie-card:hover { transform: translateY(-3px); }

        .movie-poster {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .movie-poster-placeholder {
            width: 100%;
            height: 200px;
            background: #2a2440;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 0.8rem;
            padding: 0.5rem;
            text-align: center;
        }

        .movie-info {
            padding: 0.8rem;
        }

        .movie-rating-tag {
            display: inline-block;
            background: rgba(184,59,136,0.2);
            color: var(--accent-pink);
            border-radius: 0.6rem;
            padding: 0.15rem 0.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 0.2rem;
        }

        .common-badge {
            display: inline-block;
            background: rgba(46,204,113,0.2);
            color: #2ecc71;
            border-radius: 0.6rem;
            padding: 0.15rem 0.5rem;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .empty-msg {
            color: var(--text-sec);
            text-align: center;
            padding: 3rem 0;
            grid-column: 1/-1;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .page-btn:hover:not(:disabled) {
            background: rgba(184,59,136,0.3);
            border-color: var(--accent-pink);
        }
        .page-btn:disabled { opacity: 0.3; cursor: default; }

        .page-info {
            color: var(--text-sec);
            font-size: 0.8rem;
            min-width: 6rem;
            text-align: center;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #2ecc71;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: #e74c3c; }

        /* Адаптація */
        @media (max-width: 900px) {
            .profile-container {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        @media (max-width: 768px) {
            .profile-container {
                padding: 0 1rem;
                margin: 1rem auto;
            }
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .movie-poster, .movie-poster-placeholder {
                height: 180px;
            }
        }

        @media (max-width: 480px) {
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 0.8rem;
            }
            .movie-poster, .movie-poster-placeholder {
                height: 150px;
            }
            .feed-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .toggle-btn {
                width: 100%;
            }
            .toggle-btn button {
                flex: 1;
            }
            .search-input {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Ліва панель -->
        <aside class="friends-sidebar">
            <div class="sidebar-block" id="requests-block" style="display:none;">
                <div class="sidebar-block-title">
                    Incoming Requests
                    <span class="badge" id="requests-badge">0</span>
                </div>
                <div id="requests-list"></div>
            </div>

            <div class="sidebar-block">
                <div class="sidebar-block-title">My Friends</div>
                <div id="friends-list">
                    <p style="color:var(--text-sec);">Loading...</p>
                </div>
                <a href="search_friends.html" style="
                    display:block; margin-top:1rem; text-align:center;
                    padding:0.6rem; border:2px dashed rgba(184,59,136,0.5);
                    border-radius:1rem; color:var(--accent-pink);
                    text-decoration:none; font-size:0.9rem;">
                    + Find Friends
                </a>
            </div>
        </aside>

        <!-- Права панель -->
        <main class="movies-feed">
            <div class="feed-header">
                <div class="feed-header-text">
                    <h1 id="selected-friend-name">Select a friend to see their movies</h1>
                    <p id="selected-friend-stats" style="color:var(--text-sec);"></p>
                </div>

                <div class="toggle-btn" id="toggle-btn" style="display:none;">
                    <button id="btn-all" class="active" onclick="switchMode('all')">🎬 All Movies</button>
                    <button id="btn-common" onclick="switchMode('common')">✨ Common</button>
                </div>
            </div>

            <div class="search-section" id="search-section" style="display:none;">
                <input type="text" id="searchMovies" class="search-input" placeholder="🔍 Search in these movies..." oninput="filterMovies()">
            </div>

            <div class="movies-grid" id="movies-container"></div>

            <div class="pagination" id="pagination" style="display:none;">
                <button class="page-btn" id="btn-prev" onclick="changePage(-1)">← Prev</button>
                <span class="page-info" id="page-info">Page 1 / 1</span>
                <button class="page-btn" id="btn-next" onclick="changePage(1)">Next →</button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="header.js"></script>
    <script>
        const BASE_URL = 'https://ucu-stydents-industries.onrender.com';
        const token    = localStorage.getItem('token');

        let currentFriend   = null;
        let allMovies       = [];
        let commonMovies    = [];
        let currentMode     = 'all';
        let filteredMovies  = [];
        const PER_PAGE      = 20;
        let currentPage     = 1;

        async function init() {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const [friendsResp, requestsResp] = await Promise.all([
                    fetch(`${BASE_URL}/users/friends/my`,
                        { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${BASE_URL}/users/friends/requests/incoming`,
                        { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                if (friendsResp.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                    return;
                }

                const friends  = await friendsResp.json();
                const requests = await requestsResp.json();

                renderRequests(requests);
                renderFriends(friends);

            } catch (e) {
                window.location.href = 'p_error.html';
            }
        }

        function renderRequests(requests) {
            const block = document.getElementById('requests-block');
            const list  = document.getElementById('requests-list');
            const badge = document.getElementById('requests-badge');

            if (!requests.length) {
                block.style.display = 'none';
                return;
            }

            block.style.display = 'block';
            badge.textContent   = requests.length;

            list.innerHTML = '';
            requests.forEach(user => {
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.id = `req-${user.id}`;
                div.innerHTML = `
                    <div class="avatar-circle">${user.username.charAt(0).toUpperCase()}</div>
                    <div>
                        <div class="friend-name">${user.username}</div>
                        <div class="friend-sub">wants to be friends</div>
                    </div>
                    <div class="request-actions">
                        <button class="btn-accept" onclick="acceptRequest(${user.id}, '${user.username}')">✓ Accept</button>
                        <button class="btn-reject" onclick="rejectRequest(${user.id})">✗</button>
                    </div>`;
                list.appendChild(div);
            });
        }

        async function acceptRequest(senderId, username) {
            try {
                const resp = await fetch(`${BASE_URL}/users/friends/accept/${senderId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (resp.ok) {
                    removeRequestCard(senderId);
                    showToast(`✓ ${username} is now your friend!`);
                    addFriendToList({ id: senderId, username });
                } else {
                    const d = await resp.json();
                    showToast(d.detail || 'Error', true);
                }
            } catch (e) { showToast('Server error', true); }
        }

        async function rejectRequest(senderId) {
            try {
                const resp = await fetch(`${BASE_URL}/users/friends/${senderId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (resp.ok || resp.status === 204) {
                    removeRequestCard(senderId);
                    showToast('Request rejected');
                } else {
                    const d = await resp.json();
                    showToast(d.detail || 'Error', true);
                }
            } catch (e) { showToast('Server error', true); }
        }

        function removeRequestCard(senderId) {
            const card = document.getElementById(`req-${senderId}`);
            if (card) card.remove();
            const remaining = document.querySelectorAll('#requests-list .friend-item').length;
            document.getElementById('requests-badge').textContent = remaining;
            if (!remaining) document.getElementById('requests-block').style.display = 'none';
        }

        function renderFriends(friends) {
            const list = document.getElementById('friends-list');
            if (!friends.length) {
                list.innerHTML = `
                    <div class="empty-msg">
                        No friends yet.<br>
                        <a href="search_friends.html">Find some!</a>
                    </div>`;
                return;
            }
            list.innerHTML = '';
            friends.forEach(f => addFriendToList(f));
        }

        function addFriendToList(friend) {
            const list     = document.getElementById('friends-list');
            const emptyMsg = list.querySelector('.empty-msg');
            if (emptyMsg) emptyMsg.remove();

            const div = document.createElement('div');
            div.className = 'friend-item';
            div.id = `friend-${friend.id}`;
            div.innerHTML = `
                <div class="avatar-circle">${friend.username.charAt(0).toUpperCase()}</div>
                <div>
                    <div class="friend-name">${friend.username}</div>
                    <div class="friend-sub">click to see movies</div>
                </div>
                <button class="btn-unfriend" onclick="unfriend(event, ${friend.id}, '${friend.username}')">Remove</button>`;
            div.onclick = (e) => {
                if (e.target.classList.contains('btn-unfriend')) return;
                selectFriend(friend, div);
            };
            list.appendChild(div);
        }

        async function unfriend(event, friendId, username) {
            event.stopPropagation();
            if (!confirm(`Remove ${username} from friends?`)) return;
            try {
                const resp = await fetch(`${BASE_URL}/users/friends/${friendId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (resp.ok || resp.status === 204) {
                    document.getElementById(`friend-${friendId}`)?.remove();
                    showToast(`${username} removed from friends`);
                    if (currentFriend?.id === friendId) resetFeed();
                    if (!document.querySelectorAll('#friends-list .friend-item').length) {
                        document.getElementById('friends-list').innerHTML = `
                            <div class="empty-msg">No friends yet.<br>
                            <a href="search_friends.html">Find some!</a></div>`;
                    }
                }
            } catch (e) { showToast('Server error', true); }
        }

        async function selectFriend(friend, element) {
            document.querySelectorAll('.friend-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            currentFriend = friend;
            currentMode   = 'all';
            currentPage   = 1;

            document.getElementById('selected-friend-name').textContent = `${friend.username}'s Movies`;
            document.getElementById('selected-friend-stats').textContent = 'Loading...';
            document.getElementById('movies-container').innerHTML = '';
            document.getElementById('toggle-btn').style.display = 'none';
            document.getElementById('search-section').style.display = 'none';

            document.getElementById('btn-all').classList.add('active');
            document.getElementById('btn-common').classList.remove('active');

            try {
                const [allResp, commonResp] = await Promise.all([
                    fetch(`${BASE_URL}/movies/${friend.id}/liked`),
                    fetch(`${BASE_URL}/movies/common/${friend.id}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                allMovies    = await allResp.json();
                commonMovies = await commonResp.json();

                if (allMovies.length > 0) {
                    document.getElementById('toggle-btn').style.display = 'flex';
                    document.getElementById('search-section').style.display = 'block';
                }

                filterMovies();

            } catch (e) {
                document.getElementById('selected-friend-stats').textContent = '';
                document.getElementById('movies-container').innerHTML =
                    '<p style="color:#e74c3c; grid-column:1/-1;">Failed to load movies.</p>';
            }
        }

        function filterMovies() {
            const query = document.getElementById('searchMovies')?.value.trim().toLowerCase() || '';
            const source = currentMode === 'all' ? allMovies : commonMovies;
            if (!query) {
                filteredMovies = [...source];
            } else {
                filteredMovies = source.filter(m =>
                    m.movie_name.toLowerCase().includes(query)
                );
            }
            currentPage = 1;
            renderMovies(filteredMovies, currentMode);
        }

        function switchMode(mode) {
            if (mode === currentMode) return;
            currentMode = mode;
            currentPage = 1;
            document.getElementById('btn-all').classList.toggle('active', mode === 'all');
            document.getElementById('btn-common').classList.toggle('active', mode === 'common');
            filterMovies();
        }

        function renderMovies(movies, mode) {
            const container  = document.getElementById('movies-container');
            const pagination = document.getElementById('pagination');
            const stats      = document.getElementById('selected-friend-stats');
            const name       = currentFriend?.username || '';

            if (mode === 'all') {
                stats.textContent = `${movies.length} movie${movies.length !== 1 ? 's' : ''} found`;
            } else {
                stats.textContent = movies.length > 0
                    ? `${movies.length} common movie${movies.length !== 1 ? 's' : ''} with you`
                    : `No common movies with ${name}`;
            }

            if (!movies.length) {
                container.innerHTML = `
                    <div class="empty-msg">
                        ${mode === 'common'
                            ? 'No common movies yet.'
                            : `${name} hasn't liked any movies matching your search.`}
                    </div>`;
                pagination.style.display = 'none';
                return;
            }

            const totalPages = Math.ceil(movies.length / PER_PAGE);
            const start      = (currentPage - 1) * PER_PAGE;
            const pageMovies = movies.slice(start, start + PER_PAGE);

            if (movies.length > PER_PAGE) {
                pagination.style.display = 'flex';
                document.getElementById('page-info').textContent = `Page ${currentPage} / ${totalPages}`;
                document.getElementById('btn-prev').disabled = currentPage === 1;
                document.getElementById('btn-next').disabled = currentPage === totalPages;
            } else {
                pagination.style.display = 'none';
            }

            const commonIds = new Set(commonMovies.map(m => m.id));

            container.innerHTML = pageMovies.map(m => {
                const posterUrl = m.poster_url || (m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : '');
                const rating = m.vote_average > 0 ? `<span class="movie-rating-tag">★ ${m.vote_average.toFixed(1)}</span>` : '';
                const year = m.release_date ? `<span style="color:var(--text-sec);">${m.release_date.split('-')[0]}</span>` : '';
                const commonMark = (mode === 'all' && commonIds.has(m.id)) ? `<span class="common-badge">✨ common</span>` : '';

                return `
                <div class="movie-card" title="${m.overview || ''}">
                    ${posterUrl
                        ? `<img src="${posterUrl}" class="movie-poster" alt="${m.movie_name}">`
                        : `<div class="movie-poster-placeholder">${m.movie_name}</div>`
                    }
                    <div class="movie-info">
                        <div style="font-weight:600; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            ${m.movie_name}
                        </div>
                        <div style="display:flex; align-items:center; gap:0.3rem; flex-wrap:wrap; margin-top:0.2rem;">
                            ${year} ${rating} ${commonMark}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function changePage(direction) {
            const totalPages = Math.ceil(filteredMovies.length / PER_PAGE);
            currentPage = Math.max(1, Math.min(totalPages, currentPage + direction));
            renderMovies(filteredMovies, currentMode);
        }

        function resetFeed() {
            currentFriend = null;
            allMovies = [];
            commonMovies = [];
            filteredMovies = [];
            document.getElementById('selected-friend-name').textContent = 'Select a friend to see their movies';
            document.getElementById('selected-friend-stats').textContent = '';
            document.getElementById('movies-container').innerHTML = '';
            document.getElementById('toggle-btn').style.display = 'none';
            document.getElementById('search-section').style.display = 'none';
            document.getElementById('pagination').style.display = 'none';
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => { toast.className = 'toast'; }, 2500);
        }

        init();
    </script>
</body>
</html>

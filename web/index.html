<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMatch - Home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Додаткові стилі для центрування секції hero */
        .hero {
            text-align: center;
            padding: 2rem 0;
        }
        .hero h1 {
            margin-bottom: 1.5rem;
        }
        .btn-choose {
            display: inline-block;
        }

        /* Фіксована сітка для популярних фільмів на ПК */
        @media (min-width: 1024px) {
            .movie-grid {
                grid-template-columns: repeat(5, 1fr) !important;
            }
        }
    </style>
</head>
<body>
    <!-- Header додається через header.js -->

    <main>
        <section class="hero">
            <h1>Select Movie</h1>
            <a href="#" class="btn-choose" onclick="goToChoose()">Choose</a>
        </section>

        <section id="popular">
            <h2 class="section-title">Popular Movies</h2>
            <div class="movie-grid" id="movie-grid"></div>
        </section>

        <section id="about">
            <h2 class="section-title">About Us</h2>
            <p class="text-block">
                MovieMatch is your personal guide to the world of cinema. We help you find the perfect movie for any mood.
                Our algorithms analyze your preferences to give you the best suggestions.
            </p>
        </section>

        <section id="contacts">
            <h2 class="section-title">Contacts</h2>
            <div class="contacts-grid" id="contacts-grid"></div>
        </section>
    </main>

    <script src="header.js"></script>
    <script>
        const BASE_URL = 'http://127.0.0.1:8000';

        function renderSkeletons(count = 12) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = Array.from({ length: count }).map(() => `
                <div class="movie-card">
                    <div class="movie-img skeleton"></div>
                    <div class="movie-info">
                        <h3>Loading title</h3>
                        <p>2024</p>
                    </div>
                </div>`).join('');
        }

        async function fetchMovies() {
            renderSkeletons();
            try {
                const res = await fetch(`${BASE_URL}/movies/`);
                const data = await res.json();
                const movies = (data.results || []).slice(0, 20);
                renderMovies(movies);
            } catch (e) {
                document.getElementById('movie-grid').innerHTML = `
                    <p style="color:var(--text-sec); grid-column:1/-1; text-align:center; padding:2rem;">
                        Could not connect to server.<br><br>
                        <a href="javascript:fetchMovies()" style="color:var(--accent-pink);">Try again</a>
                    </p>`;
            }
        }

        function renderMovies(movies) {
            const grid = document.getElementById('movie-grid');
            if (!movies.length) {
                grid.innerHTML = '<p style="color:var(--text-sec); grid-column:1/-1;">No movies found.</p>';
                return;
            }

            grid.innerHTML = movies.map(m => {
                const year = m.release_date ? m.release_date.split('-')[0] : '—';
                const genre = m.genres_str?.[0] || '';
                const rating = m.vote_average > 0 ? `<span class="movie-rating">★ ${m.vote_average.toFixed(1)}</span>` : '';
                const posterContent = m.poster_url
                    ? `<img src="${m.poster_url}" alt="${m.title}" loading="lazy">`
                    : `<div>${m.title}</div>`;
                return `
                <div class="movie-card" onclick="window.location.href='choose.html'">
                    <div class="movie-img">${posterContent}</div>
                    <div class="movie-info">
                        <h3>${m.title || 'Unknown'}</h3>
                        <p>${genre ? genre + ' • ' : ''}${year}</p>
                        ${rating}
                    </div>
                </div>`;
            }).join('');
        }

        function renderContacts() {
            const names = ["Voskalo Liubomyr", "Anna Kravchenko", "Tymyr Omelyanenko", "Anna Liuklian"];
            // Приклад посилань на фото (замініть на власні)
            const imageUrls = [
                "https://randomuser.me/api/portraits/men/1.jpg",   // для Любомира
                "https://randomuser.me/api/portraits/women/2.jpg", // для Анни Кравченко
                "https://randomuser.me/api/portraits/men/3.jpg",   // для Тимура
                "https://randomuser.me/api/portraits/women/4.jpg"  // для Анни Люклян
            ];

            document.getElementById('contacts-grid').innerHTML = names.map((name, index) => `
                <div class="contact-item">
                    <div class="avatar">
                        <!-- Змініть src на своє посилання -->
                        <img src="${imageUrls[index]}" alt="${name}" style="width:100%; height:100%; object-fit: cover; border-radius:50%;">
                    </div>
                    <div class="contact-card">
                        <h3>${name}</h3>
                        <!-- Телефон та статус видалено -->
                    </div>
                </div>`).join('');
        }

        renderContacts();
        fetchMovies();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMatch - Search Movies</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .search-page {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .search-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .search-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .search-header p {
            color: var(--text-sec);
            font-size: 1.1rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .search-input {
            flex: 1;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid #444;
            background: var(--panel-bg);
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px rgba(184,59,136,0.3);
        }

        .search-btn {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            background: var(--accent-pink);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .movie-card {
            background-color: var(--panel-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .movie-poster {
            height: 300px;
            width: 100%;
            background: linear-gradient(45deg, #333, #555);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .like-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.3s;
            z-index: 2;
        }
        .like-btn:hover {
            background: var(--accent-pink);
            transform: scale(1.1);
        }
        .like-btn.liked {
            background: var(--accent-pink);
        }

        .movie-info {
            padding: 15px;
        }

        .movie-info h3 {
            margin: 0 0 5px 0;
            font-size: 1rem;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-info p {
            margin: 0;
            color: var(--text-sec);
            font-size: 0.8rem;
        }

        .movie-rating {
            display: inline-block;
            background: rgba(184, 59, 136, 0.25);
            color: var(--accent-pink);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 4px;
        }

        .empty-msg {
            color: var(--text-sec);
            text-align: center;
            padding: 60px 0;
            grid-column: 1/-1;
            font-size: 1.1rem;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background: rgba(184,59,136,0.3);
            border-color: var(--accent-pink);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .page-info {
            color: var(--text-sec);
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #2ecc71;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: #e74c3c; }

        @media (max-width: 768px) {
            .search-page {
                margin: 30px auto;
                padding: 0 15px;
            }
            .search-header h1 {
                font-size: 2rem;
            }
            .search-header p {
                font-size: 1rem;
            }
            .search-box {
                flex-direction: row;
                gap: 8px;
            }
            .search-input {
                padding: 12px 20px;
                font-size: 1rem;
            }
            .search-btn {
                padding: 12px 25px;
                font-size: 1rem;
            }
            .results-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 20px;
            }
            .movie-poster {
                height: 220px;
            }
            .like-btn {
                width: 35px;
                height: 35px;
                font-size: 1rem;
            }
            .movie-info h3 {
                font-size: 0.9rem;
            }
            .movie-info p {
                font-size: 0.7rem;
            }
            .movie-rating {
                font-size: 0.65rem;
            }
            .page-btn {
                padding: 8px 15px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .search-header h1 {
                font-size: 1.5rem;
            }
            .search-header p {
                font-size: 0.9rem;
            }
            .search-box {
                flex-direction: column;
                gap: 5px;
            }
            .search-input {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
            .search-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
                width: 100%;
            }
            .results-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 15px;
            }
            .movie-poster {
                height: 180px;
            }
            .like-btn {
                width: 30px;
                height: 30px;
                font-size: 0.9rem;
            }
            .movie-info h3 {
                font-size: 0.8rem;
            }
            .movie-info p {
                font-size: 0.65rem;
            }
            .movie-rating {
                font-size: 0.6rem;
            }
            .page-btn {
                padding: 6px 10px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header will be inserted by header.js -->
    <div class="search-page">
        <div class="search-header">
            <h1>🔍 Search Movies</h1>
            <p>Find any movie by title and add to your collection</p>
        </div>
        <div class="search-box">
            <input type="text" id="searchQuery" class="search-input" placeholder="Enter movie name..." value="">
            <button class="search-btn" onclick="searchMovies()">Search</button>
        </div>
        <div class="results-grid" id="resultsGrid"></div>
        <div class="pagination" id="pagination" style="display:none;">
            <button class="page-btn" id="btn-prev" onclick="changePage(-1)">← Prev</button>
            <span class="page-info" id="page-info">Page 1 / 1</span>
            <button class="page-btn" id="btn-next" onclick="changePage(1)">Next →</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="header.js"></script>
    <script>
        const BASE_URL = 'http://127.0.0.1:8000';
        const token = localStorage.getItem('token');
        let currentQuery = '';
        let currentPage = 1;
        let totalPages = 1;
        let results = [];

        async function searchMovies(page = 1) {
            const query = document.getElementById('searchQuery').value.trim();
            if (!query) {
                document.getElementById('resultsGrid').innerHTML = '<div class="empty-msg">Please enter a movie name.</div>';
                return;
            }
            currentQuery = query;
            currentPage = page;
            try {
                const url = `${BASE_URL}/movies/?name=${encodeURIComponent(query)}&page=${page}`;
                const res = await fetch(url);
                if (!res.ok) { window.location.href = 'p_error.html'; return; }
                const data = await res.json();
                results = data.results || [];
                totalPages = data.total_pages || 1;
                renderResults();
                document.getElementById('pagination').style.display = totalPages > 1 ? 'flex' : 'none';
            } catch (e) {
                window.location.href = 'p_error.html';
            }
        }

        function renderResults() {
            const grid = document.getElementById('resultsGrid');
            const pageInfo = document.getElementById('page-info');
            if (!results.length) {
                grid.innerHTML = '<div class="empty-msg">No movies found.</div>';
                return;
            }
            grid.innerHTML = results.map(m => {
                const posterUrl = m.poster_url || (m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : '');
                const year = m.release_date ? m.release_date.split('-')[0] : '';
                const rating = m.vote_average && m.vote_average > 0 ? `<span class="movie-rating">★ ${m.vote_average.toFixed(1)}</span>` : '';
                return `
                <div class="movie-card" id="movie-${m.id}">
                    <div class="movie-poster">
                        ${posterUrl ? `<img src="${posterUrl}" alt="${m.title}">` : ''}
                        <button class="like-btn" onclick="likeMovie(event, ${m.id}, '${m.title.replace(/'/g, "\\'")}', '${m.poster_path || ''}', '${m.poster_url || ''}', '${m.overview || ''}', '${m.release_date || ''}', ${m.vote_average || 0})">❤</button>
                    </div>
                    <div class="movie-info">
                        <h3 title="${m.title}">${m.title}</h3>
                        <p>${year}</p>
                        ${rating}
                    </div>
                </div>`;
            }).join('');
            pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;
            document.getElementById('btn-prev').disabled = currentPage === 1;
            document.getElementById('btn-next').disabled = currentPage === totalPages;
        }

        function changePage(direction) {
            const newPage = currentPage + direction;
            if (newPage < 1 || newPage > totalPages) return;
            searchMovies(newPage);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function likeMovie(event, movieId, title, posterPath, posterUrl, overview, releaseDate, voteAverage) {
            event.stopPropagation();
            if (!token) {
                showToast('Please log in to like movies', true);
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }
            const btn = event.target;
            btn.disabled = true;
            try {
                const resp = await fetch(`${BASE_URL}/movies/like-movie`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        id: movieId,
                        movie_name: title,
                        poster_path: posterPath || null,
                        poster_url: posterUrl || null,
                        overview: overview || null,
                        release_date: releaseDate || null,
                        vote_average: voteAverage || null
                    })
                });
                if (!resp.ok) {
                    if (resp.status === 401) {
                        localStorage.removeItem('token');
                        showToast('Session expired. Please log in again.', true);
                        setTimeout(() => window.location.href = 'login.html', 1500);
                    } else {
                        showToast('Error liking movie', true);
                    }
                    btn.disabled = false;
                    return;
                }
                const data = await resp.json();
                showToast('❤ ' + (data.message || 'Added to favorites'));
                btn.classList.add('liked');
                btn.disabled = false;
            } catch (e) {
                showToast('Network error', true);
                btn.disabled = false;
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => { toast.className = 'toast'; }, 2500);
        }

        document.getElementById('searchQuery').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchMovies();
        });
        window.onload = () => {
            document.getElementById('resultsGrid').innerHTML = '<div class="empty-msg">Enter a movie name to start searching.</div>';
        };
    </script>
</body>
</html>

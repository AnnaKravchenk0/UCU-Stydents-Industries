<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMatch - My Collection</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-dark: #121218;
            --panel-bg: #241e38;
            --accent-pink: #b83b88;
            --text-main: #ffffff;
            --text-sec: #a0a0b0;
            --danger: #ff4757;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background-color:var(--bg-dark); color:var(--text-main); min-height:100vh; display:flex; flex-direction:column; }

        .container { max-width:1200px; margin:0 auto; padding:40px 20px; width:100%; }
        .page-header {
            margin-bottom:30px; display:flex; justify-content:space-between;
            align-items:end; border-bottom:1px solid #333; padding-bottom:20px;
        }
        .page-title h1 { font-size:2.5rem; margin-bottom:5px; }
        .page-subtitle { color:var(--text-sec); }

        .search-section {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }
        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid #444;
            background: var(--panel-bg);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus {
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px rgba(184,59,136,0.3);
        }

        .movies-grid {
            display: grid;
            grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
            gap:30px;
        }
        .movie-card {
            background-color:var(--panel-bg); border-radius:12px; overflow:hidden;
            transition:transform 0.3s, box-shadow 0.3s; position:relative;
        }
        .movie-card:hover { transform:translateY(-8px); box-shadow:0 10px 20px rgba(0,0,0,0.5); }
        .movie-poster {
            height:300px; width:100%; background-color:#333;
            display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden;
        }
        .movie-poster img { width:100%; height:100%; object-fit:cover; }
        .remove-btn {
            position:absolute; top:10px; right:10px; background-color:rgba(0,0,0,0.7);
            color:var(--danger); border:none; width:30px; height:30px; border-radius:50%;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            opacity:0; transition:0.3s; font-size:1.2rem; font-weight:bold; z-index:2;
        }
        .movie-card:hover .remove-btn { opacity:1; }
        .movie-info { padding:15px; }
        .movie-title { font-weight:600; font-size:1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        .empty-msg { color:var(--text-sec); grid-column:1/-1; text-align:center; padding:60px 0; font-size:1.1rem; }
        .empty-msg a { color:var(--accent-pink); text-decoration:none; }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background: rgba(184,59,136,0.3);
            border-color: var(--accent-pink);
        }
        .page-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .page-info {
            color: var(--text-sec);
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }

        /* Мобільні стилі */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: row;
                align-items: center;
                gap: 10px;
            }
            .page-title h1 {
                font-size: 2rem;
            }
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            .movie-poster {
                height: 220px;
            }
        }

        @media (max-width: 480px) {
            .page-title h1 {
                font-size: 1.5rem;
            }
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            .movie-poster {
                height: 180px;
            }
            .remove-btn {
                width: 25px;
                height: 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header буде додано через header.js -->
    <div class="container">
        <div class="page-header">
            <div class="page-title">
                <h1>My Liked Movies</h1>
                <div class="page-subtitle" id="subtitle">Loading...</div>
            </div>
        </div>
        <div class="search-section">
            <input type="text" id="searchMovies" class="search-input" placeholder="🔍 Search in my movies..." oninput="filterMyMovies()">
        </div>
        <div class="movies-grid" id="grid"></div>
        <div class="pagination" id="pagination" style="display:none;">
            <button class="page-btn" id="btn-prev" onclick="changePage(-1)">← Prev</button>
            <span class="page-info" id="page-info">Page 1 / 1</span>
            <button class="page-btn" id="btn-next" onclick="changePage(1)">Next →</button>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://127.0.0.1:8000';
        let allMovies = [];          // всі фільми з бекенду
        let filteredMovies = [];      // відфільтровані за пошуком
        let currentPage = 1;
        const PER_PAGE = 20;

        async function init() {
            const token  = localStorage.getItem('token');
            const userId = localStorage.getItem('userId');

            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const resp = await fetch(`${BASE_URL}/movies/${userId}/liked`);
                if (!resp.ok) {
                    document.getElementById('subtitle').textContent = 'Failed to load movies.';
                    return;
                }
                allMovies = await resp.json();
                filteredMovies = [...allMovies];
                renderMovies();
                document.getElementById('subtitle').textContent =
                    `You have ${allMovies.length} movie${allMovies.length !== 1 ? 's' : ''} in your collection!`;
            } catch (e) {
                window.location.href = 'p_error.html';
            }
        }

        function filterMyMovies() {
            const query = document.getElementById('searchMovies').value.trim().toLowerCase();
            if (!query) {
                filteredMovies = [...allMovies];
            } else {
                filteredMovies = allMovies.filter(m =>
                    m.movie_name.toLowerCase().includes(query)
                );
            }
            currentPage = 1;
            renderMovies();
        }

        function renderMovies() {
            const grid = document.getElementById('grid');
            const pagination = document.getElementById('pagination');

            if (!filteredMovies.length) {
                grid.innerHTML = `
                    <div class="empty-msg">
                        No movies found.
                    </div>`;
                pagination.style.display = 'none';
                return;
            }

            const totalPages = Math.ceil(filteredMovies.length / PER_PAGE);
            const start = (currentPage - 1) * PER_PAGE;
            const pageMovies = filteredMovies.slice(start, start + PER_PAGE);

            if (filteredMovies.length > PER_PAGE) {
                pagination.style.display = 'flex';
                document.getElementById('page-info').textContent = `Page ${currentPage} / ${totalPages}`;
                document.getElementById('btn-prev').disabled = currentPage === 1;
                document.getElementById('btn-next').disabled = currentPage === totalPages;
            } else {
                pagination.style.display = 'none';
            }

            grid.innerHTML = pageMovies.map(m => {
                const posterUrl = m.poster_path
                    ? `https://image.tmdb.org/t/p/w500${m.poster_path}`
                    : '';
                return `
                <div class="movie-card" id="card-${m.id}">
                    <div class="movie-poster">
                        <button class="remove-btn" onclick="removeCard(${m.id})">&times;</button>
                        ${posterUrl
                            ? `<img src="${posterUrl}" alt="${m.movie_name}" onerror="this.style.display='none'">`
                            : `<span style="color:#aaa; padding:10px; text-align:center;">${m.movie_name}</span>`
                        }
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${m.movie_name}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function changePage(direction) {
            const totalPages = Math.ceil(filteredMovies.length / PER_PAGE);
            currentPage = Math.max(1, Math.min(totalPages, currentPage + direction));
            renderMovies();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function removeCard(movieId) {
            const card = document.getElementById(`card-${movieId}`);
            card.style.transition = '0.3s';
            card.style.transform  = 'scale(0.8)';
            card.style.opacity    = '0';
            setTimeout(() => {
                card.remove();
                const remaining = document.querySelectorAll('.movie-card').length;
                document.getElementById('subtitle').textContent =
                    `You have ${remaining} movie${remaining !== 1 ? 's' : ''} in your collection!`;
                allMovies = allMovies.filter(m => m.id !== movieId);
                filteredMovies = filteredMovies.filter(m => m.id !== movieId);
                renderMovies();
            }, 300);
        }

        init();
    </script>
    <script src="header.js"></script>
</body>
</html>

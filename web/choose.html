<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMatch - Random Movies</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .choose-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            perspective: 1500px;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* Фіксований фільтр жанрів – завжди нижче хедера */
        .genre-filter {
            position: fixed;
            top: 80px; /* базовий відступ (хедер ~70px) */
            left: 50%;
            transform: translateX(-50%);
            z-index: 999; /* менше ніж у хедера (1000) */
            display: flex;
            gap: 10px;
            background: rgba(36, 30, 56, 0.9);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid rgba(184, 59, 136, 0.4);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .genre-filter select {
            padding: 8px 15px;
            border-radius: 30px;
            border: none;
            background: #2a2440;
            color: white;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
        }

        .genre-filter button {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            background: var(--accent-pink);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .genre-filter button:hover {
            background: var(--accent-hover);
        }

        .movie-card-big {
            display: flex;
            gap: 40px;
            background: rgba(36, 30, 56, 0.85);
            backdrop-filter: blur(25px);
            padding: 30px;
            border-radius: 40px;
            border: 1px solid rgba(184, 59, 136, 0.4);
            width: 75%;
            max-width: 1400px;
            min-height: 650px;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
            margin-top: 80px; /* відступ, щоб не наїжджати на фільтр */
        }

        .movie-card-big.finished {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .swipe-like    { transform: translateX(200%) rotate(30deg) !important; opacity: 0 !important; }
        .swipe-dislike { transform: translateX(-200%) rotate(-30deg) !important; opacity: 0 !important; }
        .new-card-anim { animation: fadeInScale 0.4s ease-out; }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }

        .swipe-label {
            position: absolute;
            top: 40px;
            font-size: 2.5rem;
            font-weight: 900;
            border: 4px solid;
            padding: 8px 20px;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.15s;
        }
        .label-like    { left: 40px;  color: #2ecc71; border-color: #2ecc71; transform: rotate(-15deg); }
        .label-dislike { right: 40px; color: #e74c3c; border-color: #e74c3c; transform: rotate(15deg); }
        .show-like    .label-like    { opacity: 1; }
        .show-dislike .label-dislike { opacity: 1; }

        .col-side {
            flex: 1;
            color: var(--text-sec);
            font-size: 1rem;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .col-center {
            flex: 1.2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .movie-main-img {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 25px;
            margin-bottom: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        #movie-title {
            font-size: 2rem;
            margin-bottom: 6px;
            color: white;
            font-weight: 800;
        }

        .movie-meta {
            color: var(--text-sec);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }

        .btn-circle {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white;
        }
        .btn-dislike { background: #4a4a6a; }
        .btn-like    { background: var(--accent-pink); }
        .btn-circle:hover  { transform: scale(1.15); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .btn-circle:active { transform: scale(0.95); }

        .info-block { margin-bottom: 28px; }
        .info-label {
            color: white;
            font-weight: 700;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .genre-tag {
            display: inline-block;
            background: rgba(184, 59, 136, 0.2);
            border: 1px solid rgba(184, 59, 136, 0.5);
            color: var(--accent-pink);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.82rem;
            margin: 3px 3px 3px 0;
        }

        .rating-bar-wrap {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin-top: 8px;
        }
        .rating-bar-fill {
            height: 8px;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--accent-pink), #ff9a9e);
            transition: width 0.5s ease;
        }

        .auth-hint {
            margin-top: 12px;
            font-size: 0.82rem;
            color: var(--text-sec);
        }
        .auth-hint a { color: var(--accent-pink); text-decoration: none; }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #2ecc71;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: #e74c3c; }

        /* Mobile adaptation – збільшені відступи, щоб фільтр не налізав на хедер */
        @media (max-width: 768px) {
            .genre-filter {
                top: 90px; /* більше місця для хедера, який може стати вищим */
                flex-wrap: wrap;
                width: 90%;
                justify-content: center;
            }
            .movie-card-big {
                flex-direction: column;
                width: 95%;
                padding: 20px;
                min-height: auto;
                margin-top: 140px; /* збільшено відповідно */
            }
            .col-side, .col-center {
                width: 100%;
            }
            .movie-main-img {
                max-width: 250px;
            }
            .controls {
                gap: 15px;
            }
            .btn-circle {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            .swipe-label {
                font-size: 1.8rem;
                top: 20px;
            }
        }
        @media (max-width: 480px) {
            .genre-filter {
                top: 100px; /* ще більше для дуже маленьких екранів */
            }
            .movie-card-big {
                padding: 15px;
                margin-top: 160px;
            }
            .movie-meta {
                font-size: 0.8rem;
            }
            .btn-circle {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header буде вставлено через header.js -->

    <div class="choose-wrapper">
        <!-- Фільтр жанрів поза карткою -->
        <div class="genre-filter">
            <select id="genre-select">
                <option value="">All genres</option>
                <option value="28">Action</option>
                <option value="12">Adventure</option>
                <option value="16">Animation</option>
                <option value="35">Comedy</option>
                <option value="80">Crime</option>
                <option value="99">Documentary</option>
                <option value="18">Drama</option>
                <option value="10751">Family</option>
                <option value="14">Fantasy</option>
                <option value="36">History</option>
                <option value="27">Horror</option>
                <option value="10402">Music</option>
                <option value="9648">Mystery</option>
                <option value="10749">Romance</option>
                <option value="878">Science Fiction</option>
                <option value="10770">TV Movie</option>
                <option value="53">Thriller</option>
                <option value="10752">War</option>
                <option value="37">Western</option>
            </select>
            <button onclick="applyGenreFilter()">Apply</button>
        </div>

        <div class="movie-card-big" id="main-card">
            <div class="swipe-label label-like">LIKE</div>
            <div class="swipe-label label-dislike">NOPE</div>

            <div class="col-side" id="left-col">
                <div class="info-label">Overview</div>
                <p id="movie-desc">Loading...</p>
            </div>

            <div class="col-center" id="center-col">
                <img src="" alt="" class="movie-main-img" id="movie-img">
                <h2 id="movie-title">—</h2>
                <div class="movie-meta" id="movie-meta"></div>
                <div class="controls">
                    <button class="btn-circle btn-dislike" onclick="handleSwipe('dislike')" title="Skip (←)">✖</button>
                    <button class="btn-circle btn-like"    onclick="handleSwipe('like')"    title="Like (→)">❤</button>
                </div>
                <p class="auth-hint" id="auth-hint" style="display:none;">
                    <a href="login.html">Log in</a> to save liked movies
                </p>
            </div>

            <div class="col-side" id="right-col">
                <div class="info-block">
                    <div class="info-label">Genres</div>
                    <div id="movie-genres"></div>
                </div>
                <div class="info-block">
                    <div class="info-label">Rating</div>
                    <div id="movie-rating" style="color:white; font-size:1.4rem; font-weight:700;">—</div>
                    <div class="rating-bar-wrap">
                        <div class="rating-bar-fill" id="rating-bar" style="width:0%"></div>
                    </div>
                </div>
                <div class="info-block">
                    <div class="info-label">Release Date</div>
                    <div id="movie-date" style="color:white; font-size:1rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="header.js"></script>
    <script>
        const BASE_URL = 'http://127.0.0.1:8000';

        let movies      = [];
        let index       = 0;
        let isSwiping   = false;
        let currentPage = 1;
        let totalPages  = 1;
        let isLoading   = false;
        let currentGenre = '';

        const token    = localStorage.getItem('token');
        const username = localStorage.getItem('username');

        if (!username) {
            document.getElementById('auth-hint').style.display = 'block';
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        async function fetchMovies(page = 1, genre = '') {
            if (isLoading) return;
            isLoading = true;

            try {
                let url = `${BASE_URL}/movies/?page=${page}`;
                if (genre) {
                    url += `&genre=${genre}`;
                } else {
                    const randomPage = Math.floor(Math.random() * 50) + 1;
                    url = `${BASE_URL}/movies/?page=${randomPage}`;
                }

                const res = await fetch(url);
                const data = await res.json();

                totalPages = data.total_pages || 1;

                const newMovies = shuffle(data.results || []);
                if (!newMovies.length) {
                    document.getElementById('movie-desc').textContent = 'No movies found.';
                    isLoading = false;
                    return;
                }

                if (page === 1) {
                    movies = newMovies;
                } else {
                    movies = [...movies, ...newMovies];
                }
                isLoading = false;

                if (page === 1) {
                    index = 0;
                    renderMovie();
                }
            } catch (e) {
                isLoading = false;
                document.getElementById('movie-desc').textContent = 'Could not connect to server.';
            }
        }

        function applyGenreFilter() {
            const genre = document.getElementById('genre-select').value;
            currentGenre = genre;
            currentPage = 1;
            fetchMovies(1, genre);
        }

        fetchMovies(1);

        function renderMovie() {
            const card = document.getElementById('main-card');

            if (index >= movies.length - 3 && !isLoading) {
                currentPage++;
                fetchMovies(currentPage, currentGenre);
            }

            if (index >= movies.length) {
                document.getElementById('movie-title').textContent = 'Loading...';
                document.getElementById('movie-desc').textContent  = 'Fetching new movies...';
                document.getElementById('movie-img').style.display = 'none';
                document.getElementById('movie-genres').innerHTML  = '';
                document.getElementById('movie-rating').textContent = '';
                document.getElementById('movie-date').textContent   = '';
                setTimeout(() => renderMovie(), 500);
                return;
            }

            const m = movies[index];

            document.getElementById('movie-title').textContent = m.title || m.original_title || 'Unknown';
            document.getElementById('movie-desc').textContent = m.overview || 'No description available.';

            const img = document.getElementById('movie-img');
            if (m.poster_url) {
                img.src = m.poster_url + '?cb=' + new Date().getTime();
                img.alt = m.title || '';
                img.style.display = 'block';
            } else {
                img.src = '';
                img.style.display = 'none';
            }

            const avg = m.vote_average;
            if (avg && avg > 0) {
                document.getElementById('movie-rating').textContent = `★ ${avg.toFixed(1)} / 10`;
                document.getElementById('rating-bar').style.width = `${avg * 10}%`;
            } else {
                document.getElementById('movie-rating').textContent = 'No ratings yet';
                document.getElementById('rating-bar').style.width = '0%';
            }

            document.getElementById('movie-date').textContent = m.release_date || '—';

            const genres = m.genres_str || [];
            document.getElementById('movie-genres').innerHTML = genres.length
                ? genres.map(g => `<span class="genre-tag">${g}</span>`).join('')
                : '<span style="color:var(--text-sec)">—</span>';
        }

        async function handleSwipe(type) {
            if (isSwiping || !movies[index]) return;
            isSwiping = true;

            const card = document.getElementById('main-card');
            card.classList.add(type === 'like' ? 'show-like' : 'show-dislike');

            if (type === 'like' && token) {
                saveLike(movies[index]);
            }

            card.classList.add(type === 'like' ? 'swipe-like' : 'swipe-dislike');

            setTimeout(() => {
                index++;
                card.classList.remove('swipe-like', 'swipe-dislike', 'show-like', 'show-dislike');
                card.classList.add('new-card-anim');
                renderMovie();
                setTimeout(() => {
                    card.classList.remove('new-card-anim');
                    isSwiping = false;
                }, 400);
            }, 500);
        }

        async function saveLike(movie) {
            try {
                await fetch(`${BASE_URL}/movies/like-movie`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        id: movie.id,
                        movie_name: movie.title || movie.original_title || 'Unknown',
                        poster_path: movie.poster_path || null,
                        poster_url: movie.poster_url || null,
                        overview: movie.overview || null,
                        release_date: movie.release_date || null,
                        vote_average: movie.vote_average || null
                    })
                });
            } catch (e) {
                console.error('saveLike error:', e);
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => { toast.className = 'toast'; }, 2500);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') handleSwipe('like');
            if (e.key === 'ArrowLeft')  handleSwipe('dislike');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMatch - Search Friends</title>
    <link rel="stylesheet" href="style.css">
    <style>
                .search-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }

        .search-input {
            flex: 1;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid #444;
            background: var(--panel-bg);
            color: white;
            font-size: 1.1rem;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--accent-pink);
            box-shadow: 0 0 10px rgba(184,59,136,0.3);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .user-card:hover { transform:translateY(-3px); border-color:var(--accent-pink); }

        .user-avatar { width:50px; height:50px; background:var(--accent-pink); border-radius:50%; flex-shrink:0; }

        .btn-add {
            margin-left: auto;
            background: transparent;
            border: 1px solid var(--accent-pink);
            color: white;
            padding: 6px 16px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .btn-add:hover:not(:disabled)  { background: var(--accent-pink); }
        .btn-add:disabled { opacity:0.5; cursor:default; }

        .status-msg { color:var(--text-sec); text-align:center; padding:20px 0; }
    </style>
</head>
<body>

    <div class="search-container">
        <h1 style="margin-bottom:25px;">Find New Friends</h1>

        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="Enter nickname...">
            <button onclick="performSearch()" class="btn-choose" style="padding:10px 30px;">Search</button>
        </div>

        <div id="results"></div>
    </div>


    <script src="header.js"></script>
</body>
</html>
